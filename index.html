<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Don't Hit My Lenovo 😭</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      margin: 0;
    }

    img {
      width: 300px;
      margin-top: 50px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    h1 {
      margin-top: 20px;
    }

    /* 🔥 SHAKE EFFECT */
    @keyframes shake {
      0% { transform: translate(0); }
      25% { transform: translate(-5px, 5px); }
      50% { transform: translate(5px, -5px); }
      75% { transform: translate(-5px, -5px); }
      100% { transform: translate(0); }
    }

    .shake {
      animation: shake 0.2s;
    }
  </style>
</head>

<body>

  <h1>Don't hit my Lenovo 😭</h1>

  <!-- 🔥 WARNING TEXT -->
